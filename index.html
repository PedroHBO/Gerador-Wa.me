<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Links WhatsApp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #25D366; margin-bottom: 20px; }
        
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { color: #333; font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid #25D366; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .btn-primary { background: #25D366; color: white; }
        .btn-primary:hover { background: #20bd5a; }
        .btn-secondary { background: #e8e8e8; color: #333; }
        .btn-secondary:hover { background: #ddd; }
        .btn-danger { background: #ff4757; color: white; }
        
        .numbers-input { display: flex; gap: 10px; margin-bottom: 15px; }
        .numbers-input input { flex: 1; }
        
        .numbers-list { max-height: 300px; overflow-y: auto; }
        .number-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .number-item:last-child { border-bottom: none; }
        .number-item .info { flex: 1; }
        .number-item .phone { font-weight: 600; color: #333; }
        .number-item .status { font-size: 12px; }
        .number-item .status.valid { color: #25D366; }
        .number-item .status.invalid { color: #ff4757; }
        .number-item .link { font-size: 12px; color: #666; word-break: break-all; margin-top: 5px; }
        .number-item .actions { display: flex; gap: 8px; }
        .number-item .btn { padding: 6px 12px; font-size: 12px; }
        
        .actions-bar { display: flex; gap: 10px; margin-top: 15px; }
        
        .greeting-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; margin-left: 10px; }
        .greeting-badge.morning { background: #fff3cd; color: #856404; }
        .greeting-badge.afternoon { background: #d4edda; color: #155724; }
        .greeting-badge.night { background: #d1ecf1; color: #0c5460; }

        .empty-state { text-align: center; padding: 40px; color: #999; }
        
        @media (max-width: 600px) {
            .row { flex-direction: column; }
            .numbers-input { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Gerador de Links WhatsApp</h1>
        
        <div class="card">
            <h2>Configurações</h2>
            <div class="row">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="nome" value="Pedro Henrique">
                </div>
                <div class="form-group">
                    <label>Setor</label>
                    <input type="text" id="setor" value="TI">
                </div>
            </div>
            <div class="form-group">
                <label>Template da Mensagem</label>
                <textarea id="template">{greeting}, meu nome é {nome}, sou do setor de {setor}, recebi sua solicitação</textarea>
            </div>
            <div class="actions-bar">
                <button class="btn btn-primary" onclick="generateLinks()">🔄 Gerar Links</button>
                <button class="btn btn-secondary" onclick="saveConfig()">💾 Salvar Config</button>
            </div>
        </div>
        
        <div class="card">
            <h2>Números <span id="greetingBadge" class="greeting-badge morning">Bom dia</span></h2>
            <div class="numbers-input">
                <input type="text" id="phoneInput" placeholder="(DDD) 99999-9999" onkeypress="handleEnter(event)">
                <button class="btn btn-primary" onclick="addNumber()">➕ Adicionar</button>
            </div>
            <div class="numbers-list" id="numbersList"></div>
            <div class="actions-bar">
                <button class="btn btn-danger" onclick="clearNumbers()">🗑️ Limpar Tudo</button>
            </div>
        </div>
    </div>

    <script>
        let numbers = [];
        
        function init() {
            const savedConfig = localStorage.getItem('waConfig');
            if (savedConfig) {
                const config = JSON.parse(savedConfig);
                document.getElementById('nome').value = config.nome || 'Pedro Henrique';
                document.getElementById('setor').value = config.setor || 'TI';
                document.getElementById('template').value = config.template || '{greeting}, meu nome é {nome}, sou do setor de {setor}, recebi sua solicitação';
            }
            
            const savedNumbers = localStorage.getItem('waNumbers');
            if (savedNumbers) {
                numbers = JSON.parse(savedNumbers);
                renderNumbers();
            }
            
            updateGreeting();
        }
        
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting, badgeClass;
            if (hour >= 7 && hour < 12) {
                greeting = 'Bom dia';
                badgeClass = 'morning';
            } else if (hour >= 12 && hour < 18) {
                greeting = 'Boa tarde';
                badgeClass = 'afternoon';
            } else {
                greeting = 'Boa noite';
                badgeClass = 'night';
            }
            document.getElementById('greetingBadge').textContent = greeting;
            document.getElementById('greetingBadge').className = `greeting-badge ${badgeClass}`;
        }
        
        function validatePhone(phone) {
            const cleaned = phone.replace(/\D/g, '');
            return /^\d{10,11}$/.test(cleaned);
        }
        
        function formatPhone(phone) {
            const cleaned = phone.replace(/\D/g, '');
            if (cleaned.length === 10) {
                return `(${cleaned.slice(0,2)}) ${cleaned.slice(2,6)}-${cleaned.slice(6)}`;
            } else if (cleaned.length === 11) {
                return `(${cleaned.slice(0,2)}) ${cleaned.slice(2,3)} ${cleaned.slice(3,7)}-${cleaned.slice(7)}`;
            }
            return phone;
        }
        
        function addNumber() {
            const input = document.getElementById('phoneInput');
            const phone = input.value.trim();
            
            if (!phone) return;
            
            const cleaned = phone.replace(/\D/g, '');
            const isValid = validatePhone(cleaned);
            
            numbers.push({ phone: cleaned, original: phone, valid: isValid });
            input.value = '';
            renderNumbers();
            saveNumbers();
        }
        
        function removeNumber(index) {
            numbers.splice(index, 1);
            renderNumbers();
            saveNumbers();
        }
        
        function clearNumbers() {
            if (confirm('Limpar todos os números?')) {
                numbers = [];
                renderNumbers();
                saveNumbers();
            }
        }
        
        function renderNumbers() {
            const list = document.getElementById('numbersList');
            
            if (numbers.length === 0) {
                list.innerHTML = '<div class="empty-state">Nenhum número adicionado</div>';
                return;
            }
            
            const hour = new Date().getHours();
            let greeting;
            if (hour >= 7 && hour < 12) greeting = 'Bom dia';
            else if (hour >= 12 && hour < 18) greeting = 'Boa tarde';
            else greeting = 'Boa noite';
            
            const nome = document.getElementById('nome').value;
            const setor = document.getElementById('setor').value;
            const template = document.getElementById('template').value;
            
            const message = template
                .replace('{greeting}', greeting)
                .replace('{nome}', nome)
                .replace('{setor}', setor);
            
            list.innerHTML = numbers.map((n, i) => `
                <div class="number-item">
                    <div class="info">
                        <div class="phone">${formatPhone(n.phone)}</div>
                        <div class="status ${n.valid ? 'valid' : 'invalid'}">${n.valid ? '✓ Válido' : '✗ Inválido'}</div>
                        ${n.valid ? `<div class="link">wa.me/+55${n.phone}?text=${encodeURIComponent(message).slice(0,50)}...</div>` : ''}
                    </div>
                    <div class="actions">
                        ${n.valid ? `<button class="btn btn-primary" onclick="openWhatsapp(${i})">Abrir</button>` : ''}
                        <button class="btn btn-danger" onclick="removeNumber(${i})">✕</button>
                    </div>
                </div>
            `).join('');
        }
        
        function generateLinks() {
            renderNumbers();
        }
        
        function saveConfig() {
            const config = {
                nome: document.getElementById('nome').value,
                setor: document.getElementById('setor').value,
                template: document.getElementById('template').value
            };
            localStorage.setItem('waConfig', JSON.stringify(config));
            alert('Configurações salvas!');
        }
        
        function saveNumbers() {
            localStorage.setItem('waNumbers', JSON.stringify(numbers));
        }
        
        function openWhatsapp(index) {
            const n = numbers[index];
            const message = document.getElementById('template').value
                .replace('{greeting}', document.getElementById('greetingBadge').textContent)
                .replace('{nome}', document.getElementById('nome').value)
                .replace('{setor}', document.getElementById('setor').value);
            
            const link = `https://wa.me/+55${n.phone}?text=${encodeURIComponent(message)}`;
            window.open(link, '_blank');
        }
        
        async function openAllLinks() {
            const validNumbers = numbers.filter(n => n.valid);
            if (validNumbers.length === 0) {
                alert('Nenhum número válido');
                return;
            }
            
            const hour = new Date().getHours();
            let greeting;
            if (hour >= 7 && hour < 12) greeting = 'Bom dia';
            else if (hour >= 12 && hour < 18) greeting = 'Boa tarde';
            else greeting = 'Boa noite';
            
            const message = document.getElementById('template').value
                .replace('{greeting}', greeting)
                .replace('{nome}', document.getElementById('nome').value)
                .replace('{setor}', document.getElementById('setor').value);
            
            for (let i = 0; i < validNumbers.length; i++) {
                const n = validNumbers[i];
                const link = `https://wa.me/+55${n.phone}?text=${encodeURIComponent(message)}`;
                window.open(link, '_blank');
                await new Promise(r => setTimeout(r, 500));
            }
        }
        
        function copyLink(index) {
            const n = numbers[index];
            const message = document.getElementById('template').value
                .replace('{greeting}', document.getElementById('greetingBadge').textContent)
                .replace('{nome}', document.getElementById('nome').value)
                .replace('{setor}', document.getElementById('setor').value);
            
            const link = `https://wa.me/+55${n.phone}?text=${encodeURIComponent(message)}`;
            navigator.clipboard.writeText(link);
            alert('Link copiado!');
        }
        
        function copyAllLinks() {
            const validNumbers = numbers.filter(n => n.valid);
            if (validNumbers.length === 0) {
                alert('Nenhum número válido para copiar');
                return;
            }
            
            const hour = new Date().getHours();
            let greeting;
            if (hour >= 7 && hour < 12) greeting = 'Bom dia';
            else if (hour >= 12 && hour < 18) greeting = 'Boa tarde';
            else greeting = 'Boa noite';
            
            const message = document.getElementById('template').value
                .replace('{greeting}', greeting)
                .replace('{nome}', document.getElementById('nome').value)
                .replace('{setor}', document.getElementById('setor').value);
            
            const links = validNumbers.map(n => 
                `https://wa.me/+55${n.phone}?text=${encodeURIComponent(message)}`
            ).join('\n');
            
            navigator.clipboard.writeText(links);
            alert(`${validNumbers.length} links copiados!`);
        }
        
        function handleEnter(e) {
            if (e.key === 'Enter') addNumber();
        }
        
        init();
    </script>
</body>
</html>
